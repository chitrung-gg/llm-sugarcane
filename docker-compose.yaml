name: sugarcane
services:
  database:
    image: postgres:18-trixie
    # restart: always
    container_name: sugarcane_database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sugarcane
    volumes:
      - postgres:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  